<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Besucherausweis Check-In</title>
 <style>
        body {
            font-family: Helvetica Neue LT W1G 75 Bold;
            color: #4D4D4D;
            margin: 0;
            padding: 10px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            text-align: center;
            background-color: white;
            overflow: hidden;
        }
        .welcome-screen {
            width: 100%;
            height: 100vh;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            transition: transform 1s ease-in-out;
        }
        .header-img {
            width: 100%;
            height: top;
            margin-bottom: 0px;
        }
        button {
            padding: 30px 110px;
            font-size: 22px;
            cursor: pointer;
            color: white;
            margin-bottom: 300px;
            text-align: center;
            border-radius: 10px;
            border-color:#F8AF00;
            background: #F8AF00;
        }
        .check-in {
            width: 100%;
            height: 100vh;
            position: absolute;
            top: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('office.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: top 1s ease-in-out;
            overflow: auto;
        }
        .container {
            max-width: 600px;
            width: 100%;
            height: 720px;
            background: rgba(255, 255, 255, 0.8);
            padding: 20px;
            box-sizing: border-box;
            border-radius: 10px;
            text-align: left;
            position: relative;
        }
        .form-group {
            margin-bottom: 15px;                                                                                                                 
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size:18pt;
        }
        input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            font-size: 20px;
            border-radius: 10px;
        }
        .check-in-button {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="Bluebar.jpg" alt="Header Image" class="header-img">
        <h1>Besucherausweis Check-In</h1>
        <div class="form-group">
            <label for="vorname">Vorname</label>
            <input type="text" id="vorname" required>
        </div>
        <div class="form-group">
            <label for="nachname">Nachname</label>
            <input type="text" id="nachname" required>
        </div>
         <div class="form-group">
            <label for="firmenname">Firmenname</label>
            <input type="text" id="firmenname" required>
        </div>

        <div class="form-group">
            <label for="email">Email Adresse</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label for="kontakt">Brother Kontakt</label>
            <input type="text" id="kontakt" required>
        </div>
        <button onclick="checkIn()">Check In</button>
    </div>

    <script>
        function checkIn() {
            const vorname = document.getElementById('vorname').value;
            const nachname = document.getElementById('nachname').value;
            const firmenname = document.getElementById('firmenname').value;
            const email = document.getElementById('email').value;
            const kontakt = document.getElementById('kontakt').value;
            const checkInTime = new Date().toLocaleString();

            // Generate URL
            const url = `brotherwebprint://print?filename=visitor.lbx&size=RollW54&text_vorname=${encodeURIComponent(vorname)}&text_nachname=${encodeURIComponent(nachname)}&text_firmenname=${encodeURIComponent(firmenname)}&text_email=${encodeURIComponent(email)}&text_kontakt=${encodeURIComponent(kontakt)}`;
            window.open(url, '_blank');

            // Save check-in data to localStorage
            const checkInData = JSON.parse(localStorage.getItem('checkInData')) || [];
            checkInData.push({ vorname, nachname, email, kontakt, checkInTime, checkedOut: false });
            localStorage.setItem('checkInData', JSON.stringify(checkInData));
        }
    </script>
</body>
</html>
